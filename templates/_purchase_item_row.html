<div class="item-row row g-2 align-items-end">
    <div class="col-md-4"><label class="form-label">Název položky *</label><input class="form-control" name="item_name[]" required value="{{ item.item_name if item else '' }}"></div>
    <div class="col-md-2"><label class="form-label">Množství *</label><input type="number" step="0.01" min="0.01" class="form-control" name="quantity[]" required value="{{ item.quantity if item else 1 }}"></div>
    <div class="col-md-2"><label class="form-label">Jednotka *</label><input class="form-control" name="unit[]" required value="{{ item.unit if item else 'ks' }}"></div>
    <div class="col-md-3"><label class="form-label">Poznámka</label><input class="form-control" name="item_note[]" value="{{ item.note if item else '' }}"></div>
    <div class="col-md-1"><button type="button" class="btn btn-outline-danger w-100 remove-item">×</button></div>
</div>
