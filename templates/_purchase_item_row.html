<div class="item-row row g-2 align-items-end">
    <div class="col-md-3"><label class="form-label">Položka *</label><select class="form-select item-select" name="item_name[]" required><option value="">Vyberte položku</option>{% for catalog_item in catalog %}<option value="{{ catalog_item.item_name }}" data-price="{{ catalog_item.default_price }}" data-weight="{{ catalog_item.weight_grams }}" {% if item and item.item_name == catalog_item.item_name %}selected{% endif %}>{{ catalog_item.item_name }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Množství *</label><input type="number" step="0.01" min="0.01" class="form-control quantity-input" name="quantity[]" required value="{{ item.quantity if item else 1 }}"></div>
    <div class="col-md-2"><label class="form-label">Cena/ks</label><input type="number" step="0.01" min="0" class="form-control price-input" name="unit_price[]" value="{{ item.unit_price if item else 0 }}"></div>
    <div class="col-md-2"><label class="form-label">Poznámka</label><input class="form-control" name="item_note[]" value="{{ item.note if item else '' }}"></div>
    <div class="col-md-1"><button type="button" class="btn btn-outline-danger w-100 remove-item">×</button></div>
    <div class="col-12 item-total text-secondary">Řádek: $0 | 0g</div>
</div>
